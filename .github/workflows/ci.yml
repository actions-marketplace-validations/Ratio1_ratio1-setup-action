name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate YAML files
        run: |
          ruby -e "require 'yaml'; YAML.load_file('action.yml'); puts 'action.yml OK'"
          ruby -e "require 'yaml'; YAML.load_file('.github/workflows/ci.yml'); puts 'ci.yml OK'"
          ruby -e "require 'yaml'; YAML.load_file('.github/workflows/move-major-tag.yml'); puts 'move-major-tag.yml OK'"
          ruby -e "require 'yaml'; YAML.load_file('examples/consumer-workflow.yml'); puts 'example workflow OK'"

      - name: Validate action contract
        run: |
          grep -q '^name:' action.yml
          grep -q '^runs:' action.yml
          grep -q 'using: composite' action.yml

  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run local action smoke test
        uses: ./
        with:
          sdk_version: "3.5.13"
          network: testnet
          command: python -c "import ratio1; print('ratio1 smoke test ok')"
